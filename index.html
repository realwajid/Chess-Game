<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Game</title>
    <link rel="stylesheet" href="chess.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Oswald:wght@200..700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>

    <div class="game-wrapper">
        <h1 class="main-title">CHESS GAME</h1>

        <div class="chess-container">
            <div class="player-label">OPPONENT (BLACK)</div>
            
            <div class="board">
                <div class="s w">♜</div><div class="s b">♞</div><div class="s w">♝</div><div class="s b">♛</div>
                <div class="s w">♚</div><div class="s b">♝</div><div class="s w">♞</div><div class="s b">♜</div>
                <div class="s b">♟</div><div class="s w">♟</div><div class="s b">♟</div><div class="s w">♟</div>
                <div class="s b">♟</div><div class="s w">♟</div><div class="s b">♟</div><div class="s w">♟</div>
                <div class="s w"></div><div class="s b"></div><div class="s w"></div><div class="s b"></div><div class="s w"></div><div class="s b"></div><div class="s w"></div><div class="s b"></div>
                <div class="s b"></div><div class="s w"></div><div class="s b"></div><div class="s w"></div><div class="s b"></div><div class="s w"></div><div class="s b"></div><div class="s w"></div>
                <div class="s w"></div><div class="s b"></div><div class="s w"></div><div class="s b"></div><div class="s w"></div><div class="s b"></div><div class="s w"></div><div class="s b"></div>
                <div class="s b"></div><div class="s w"></div><div class="s b"></div><div class="s w"></div><div class="s b"></div><div class="s w"></div><div class="s b"></div><div class="s w"></div>
                <div class="s w">♙</div><div class="s b">♙</div><div class="s w">♙</div><div class="s b">♙</div>
                <div class="s w">♙</div><div class="s b">♙</div><div class="s w">♙</div><div class="s b">♙</div>
                <div class="s b">♖</div><div class="s w">♘</div><div class="s b">♗</div><div class="s w">♕</div>
                <div class="s b">♔</div><div class="s w">♗</div><div class="s b">♘</div><div class="s w">♖</div>
            </div>

            <div class="player-label bottom">YOU (WHITE)</div>
        </div>
    </div>

</body>
</html>
